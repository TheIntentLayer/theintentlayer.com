# Nginx configuration for AiCC platform
# Manages both theintentlayer.com (website) and mcp.theintentlayer.com (MCP server)
#
# Prerequisite: Add rate limiting zone to /etc/nginx/nginx.conf http block:
#   limit_req_zone $binary_remote_addr zone=mcp:10m rate=30r/m;
#
# Install: cp this file to /etc/nginx/sites-available/aicc
#          ln -sf /etc/nginx/sites-available/aicc /etc/nginx/sites-enabled/aicc

# --- HTTP to HTTPS redirect (both domains) ---

server {
    listen 80;
    server_name theintentlayer.com www.theintentlayer.com mcp.theintentlayer.com;
    return 301 https://$host$request_uri;
}

# --- Website: theintentlayer.com ---

server {
    listen 443 ssl http2;
    server_name theintentlayer.com www.theintentlayer.com;

    ssl_certificate /etc/letsencrypt/live/theintentlayer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theintentlayer.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- MCP Server: mcp.theintentlayer.com ---

server {
    listen 443 ssl http2;
    server_name mcp.theintentlayer.com;

    ssl_certificate /etc/letsencrypt/live/mcp.theintentlayer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.theintentlayer.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting (brute-force protection for API key guessing)
    limit_req zone=mcp burst=10 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE/streaming support (required for MCP protocol)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check (no rate limiting)
    location /health {
        limit_req off;
        proxy_pass http://127.0.0.1:8443/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
