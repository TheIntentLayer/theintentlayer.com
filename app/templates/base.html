<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Intent Layer{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">The Intent Layer</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/product">Product</a>
            {% if user %}
            <a href="/dashboard">Dashboard</a>
            {% else %}
            <a href="/auth/login">Sign In</a>
            <a href="/auth/register" class="btn btn-nav">Get Started</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <footer>
        <div class="container">
            &copy; 2026 The Intent Layer &middot;
            <a href="https://theintentlayer.com">theintentlayer.com</a> &middot;
            <a href="https://aitrustcommons.org">AI Trust Commons</a> &middot;
            <a href="https://hipcharter.com">HIP Charter</a>
        </div>
    </footer>
    {% endblock %}
</body>
</html>
